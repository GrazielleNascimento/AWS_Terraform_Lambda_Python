name: Deploy AWS with Terraform after PR

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  deploy_terraform:
    name: Deploy Terraform to AWS
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          pip install black isort
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # Criação de diretórios, incluindo hello_terraform, caso não existam
      - name: Create directories for Lambda functions
        run: |
          mkdir -p src/lambdas/hello_terraform
          mkdir -p src/lambdas/add_item
          mkdir -p src/lambdas/delete_item
          mkdir -p src/lambdas/update_item

      # Depuração: Listar arquivos em src/lambdas
      - name: List files in src/lambdas
        run: ls -R src/lambdas/

      # Check Python formatting with Black
      - name: Check Python formatting with Black
        run: |
          if [ -d "src/lambdas" ]; then
            black --check src/lambdas/ || echo "⚠️ Python files need formatting"
          else
            echo "ℹ️ No Python files found in src/lambdas/"
          fi
        continue-on-error: true

      # Check import order with isort
      - name: Check import order with isort
        run: |
          if [ -d "src/lambdas" ]; then
            isort --check-only src/lambdas/ || echo "⚠️ Imports need sorting"
          else
            echo "ℹ️ No Python files found for import checking"
          fi
        continue-on-error: true

      # Build Lambda Packages
      - name: Build Lambda Packages
        run: |
          cd scripts
          python build.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform
