name: Deploy AWS with Terraform after PR

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  deploy_terraform:
    name: Deploy Terraform to AWS
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout do código
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Configurar credenciais AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      # 3. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 4. Instalar dependências Python
      - name: Install Python dependencies
        run: |
          pip install black isort
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # 5. Criar diretórios para funções Lambda, se necessário
      - name: Create directories for Lambda functions
        run: |
          mkdir -p src/lambdas/hello_terraform
          mkdir -p src/lambdas/add_item
          mkdir -p src/lambdas/delete_item
          mkdir -p src/lambdas/update_item

      # 6. Verificar arquivos e diretórios
      - name: List files in src/lambdas
        run: ls -R src/lambdas/

      # 7. Verificar formatação Python com Black
      - name: Check Python formatting with Black
        run: |
          if [ -d "src/lambdas" ]; then
            black --check src/lambdas/ || echo "⚠️ Python files need formatting"
          else
            echo "ℹ️ No Python files found in src/lambdas/"
          fi
        continue-on-error: true

      # 8. Verificar ordem de importação com isort
      - name: Check import order with isort
        run: |
          if [ -d "src/lambdas" ]; then
            isort --check-only src/lambdas/ || echo "⚠️ Imports need sorting"
          else
            echo "ℹ️ No Python files found for import checking"
          fi
        continue-on-error: true

      # 9. Empacotar funções Lambda
      - name: Build Lambda Packages
        run: |
          cd scripts
          python build.py

      # 10. Configurar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # 11. Inicializar Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # 12. Validar Terraform
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      # 13. Planejar Terraform
      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        working-directory: ./terraform

      # 14. Aplicar Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform
