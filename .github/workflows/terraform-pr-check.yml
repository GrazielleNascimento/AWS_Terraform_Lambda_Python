name: Deploy AWS with Terraform after PR 

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]

jobs:
  deploy_terraform:
    name: Deploy Terraform to AWS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout do código
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Configurar credenciais AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      # 3. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 4. Build Lambda ZIPs (Este passo já lida com as dependências)
      - name: Build Lambda ZIPs
        run: python scripts/build.py
        working-directory: ${{ github.workspace }}

      # 5. Verificar formatação Python com Black
      - name: Check Python formatting with Black
        run: |
          if [ -d "src/lambdas" ]; then
            black --check src/lambdas/ || echo "⚠️ Python files need formatting"
          else
            echo "ℹ️ No Python files found in src/lambdas/"
          fi
        continue-on-error: true

      # 6. Verificar ordem de importação com isort
      - name: Check import order with isort
        run: |
          if [ -d "src/lambdas" ]; then
            isort --check-only src/lambdas/ || echo "⚠️ Imports need sorting"
          else
            echo "ℹ️ No Python files found for import checking"
          fi
        continue-on-error: true

      # 7. Configurar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # 8. Inicializar Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # 9. Validar Terraform
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      # 10. Planejar Terraform
      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        working-directory: ./terraform

      # 11. Aplicar Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform
