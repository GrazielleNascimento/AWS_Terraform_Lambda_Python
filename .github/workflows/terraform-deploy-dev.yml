name: "Deploy to Development"

on:
  pull_request:
    types: [closed]
    branches: [ develop ]
    paths:
      - 'terraform/**'
      - 'src/**'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: github.event.pull_request.merged == true
    name: "Deploy to Dev Environment"
    runs-on: ubuntu-latest
    environment: development
    
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Configure AWS Credentials for Dev
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Build Lambda Packages
        working-directory: ${{ github.workspace }}
        run: python scripts/build.py

      - name: Terraform Format Check
        run: terraform fmt -check -recursive  

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="environment=dev" \
            -var="region=us-east-1" \
            -var="dynamodb_table_name=MarketList-dev"

      - name: Store Outputs
        id: tf-outputs
        run: |
          echo "api_endpoint=$(terraform output -raw api_gateway_endpoint)" >> $GITHUB_OUTPUT

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "🚀 Deployment to Dev Environment Successful!"
          echo "API Endpoint: ${{ steps.tf-outputs.outputs.api_endpoint }}"